name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    name: Lint, Test & Docker Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: leanstock
          POSTGRES_PASSWORD: leanstock_pass
          POSTGRES_DB: leanstock_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://leanstock:leanstock_pass@localhost:5432/leanstock_test
      JWT_SECRET: ci-test-jwt-secret-min-32-chars-do-not-use-in-prod
      JWT_REFRESH_SECRET: ci-test-refresh-secret-min-32-chars-do-not-use
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3001
      RATE_LIMIT_AUTH_MAX: 100
      RATE_LIMIT_AUTH_WINDOW_MS: 60000
      BCRYPT_ROUNDS: 4
      DEAD_STOCK_THRESHOLD_DAYS: 30
      DEAD_STOCK_DECAY_PERCENT: 10
      DEAD_STOCK_DECAY_MAX_PERCENT: 50
      CRON_ENABLED: false
      DEFAULT_PAGE_SIZE: 20
      MAX_PAGE_SIZE: 100
      SYSTEM_USER_ID: system
      APP_LOG_LEVEL: error

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run linter
        run: npm run lint
        continue-on-error: false

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Build Docker image
        run: docker build -t leanstock-api:${{ github.sha }} .

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
