openapi: 3.0.3
info:
  title: LeanStock Inventory Management API
  description: |
    REST API for multi-tenant inventory management with JWT authentication,
    role-based access control, PostgreSQL-backed stock transfers, FIFO lot
    tracking, and dead stock decay reporting.
  version: 1.0.0
  contact:
    name: LeanStock Team

servers:
  - url: http://localhost:3000/api/v1
    description: Local development

tags:
  - name: Auth
    description: Authentication, token refresh, and user profile endpoints.
  - name: Products
    description: Product catalog operations.
  - name: Inventory
    description: Inventory stock, receiving, reservations, and transfers.
  - name: Warehouses
    description: Warehouse operations.
  - name: Locations
    description: Storage location operations within warehouses.
  - name: Reports
    description: Dead stock, decay history, and low stock reports.
  - name: Jobs
    description: Background job visibility for Redis-backed queues.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource identifier.
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        default: 20
      description: Maximum records to return.
    AfterQuery:
      name: after
      in: query
      schema:
        type: string
      description: Cursor returned by the previous page as `pagination.next_cursor`.

  responses:
    Unauthorized:
      description: Missing, expired, or invalid access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user does not have the required role.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request body or parameters failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Request rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NoContent:
      description: Request completed successfully with no response body.

  schemas:
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Validation failed
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                    example: email
                  message:
                    type: string
                    example: Invalid email format
            retry_after_ms:
              type: integer
              example: 500

    Pagination:
      type: object
      required: [has_more, next_cursor, count]
      properties:
        has_more:
          type: boolean
          example: true
        next_cursor:
          type: string
          nullable: true
          example: eyJpZCI6ImNseDEyMyJ9
        count:
          type: integer
          example: 20

    User:
      type: object
      properties:
        id:
          type: string
          example: clxuser001
        email:
          type: string
          format: email
          example: admin@leanstock.com
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        role:
          type: string
          enum: [MANAGER, WAREHOUSE_OPERATOR, AUDITOR, SYSTEM_ADMIN]
          example: SYSTEM_ADMIN
        is_active:
          type: boolean
          example: true
        is_email_verified:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time

    SignupRequest:
      type: object
      required: [email, password, first_name, last_name]
      properties:
        email:
          type: string
          format: email
          example: new.operator@leanstock.com
        password:
          type: string
          minLength: 8
          example: SecurePass123
        first_name:
          type: string
          example: New
        last_name:
          type: string
          example: Operator
        phone:
          type: string
          example: "+77001234567"

    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name]
      properties:
        email:
          type: string
          format: email
          example: new.operator@leanstock.com
        password:
          type: string
          minLength: 8
          example: SecurePass123
        first_name:
          type: string
          minLength: 1
          maxLength: 100
          example: New
        last_name:
          type: string
          minLength: 1
          maxLength: 100
          example: Operator
        phone:
          type: string
          example: "+77001234567"
        role:
          type: string
          enum: [MANAGER, WAREHOUSE_OPERATOR, AUDITOR, SYSTEM_ADMIN]
          default: WAREHOUSE_OPERATOR
          example: WAREHOUSE_OPERATOR

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@leanstock.com
        password:
          type: string
          example: Admin123

    AuthTokenResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [access_token, refresh_token, token_type, user]
          properties:
            access_token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            refresh_token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            token_type:
              type: string
              example: Bearer
            user:
              $ref: '#/components/schemas/User'

    AccessTokenResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [access_token, refresh_token, token_type]
          properties:
            access_token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            refresh_token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            token_type:
              type: string
              example: Bearer

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          example: OldPass123
        new_password:
          type: string
          minLength: 8
          example: NewPass123

    TokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          example: 8af8e9d3d4a8c2b0d5f5f12a3c4b5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f012345

    EmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: new.operator@leanstock.com

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
          example: 8af8e9d3d4a8c2b0d5f5f12a3c4b5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f012345
        new_password:
          type: string
          minLength: 8
          example: SecurePass456

    Product:
      type: object
      properties:
        id:
          type: string
          example: clxprod001
        sku:
          type: string
          example: WDG-001
        name:
          type: string
          example: Industrial Widget
        description:
          type: string
          nullable: true
          example: High durability inventory item.
        category:
          type: string
          example: Electronics
        base_price:
          type: number
          format: double
          example: 99.99
        discount_percentage:
          type: integer
          minimum: 0
          maximum: 100
          example: 0
        is_discontinued:
          type: boolean
          example: false
        sold_count:
          type: integer
          example: 12
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProductRequest:
      type: object
      required: [sku, name, category, base_price]
      properties:
        sku:
          type: string
          minLength: 1
          maxLength: 100
          example: WDG-001
        name:
          type: string
          minLength: 1
          maxLength: 500
          example: Industrial Widget
        description:
          type: string
          example: High durability inventory item.
        category:
          type: string
          minLength: 1
          maxLength: 100
          example: Electronics
        base_price:
          type: number
          minimum: 0
          exclusiveMinimum: true
          example: 99.99
        discount_percentage:
          type: integer
          minimum: 0
          maximum: 100
          default: 0

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
        category:
          type: string
          minLength: 1
          maxLength: 100
        base_price:
          type: number
          minimum: 0
          exclusiveMinimum: true
        discount_percentage:
          type: integer
          minimum: 0
          maximum: 100
        is_discontinued:
          type: boolean

    Warehouse:
      type: object
      properties:
        id:
          type: string
          example: clxwh001
        name:
          type: string
          example: Main Almaty Warehouse
        country:
          type: string
          example: Kazakhstan
        city:
          type: string
          example: Almaty
        status:
          type: string
          enum: [ACTIVE, CLOSED, MAINTENANCE]
          example: ACTIVE
        is_hidden:
          type: boolean
          example: false
        hidden_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            locations:
              type: integer
              example: 4

    CreateWarehouseRequest:
      type: object
      required: [name, country, city]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Main Almaty Warehouse
        country:
          type: string
          minLength: 1
          maxLength: 100
          example: Kazakhstan
        city:
          type: string
          minLength: 1
          maxLength: 100
          example: Almaty

    UpdateWarehouseRequest:
      type: object
      properties:
        name:
          type: string
          example: Main Astana Warehouse
        country:
          type: string
          example: Kazakhstan
        city:
          type: string
          example: Astana
        status:
          type: string
          enum: [ACTIVE, CLOSED, MAINTENANCE]

    Location:
      type: object
      properties:
        id:
          type: string
          example: clxloc001
        warehouse_id:
          type: string
          example: clxwh001
        name:
          type: string
          example: Aisle A Row 1
        address:
          type: string
          nullable: true
          example: North zone, shelf 1
        capacity_units:
          type: integer
          example: 1000
        current_volume:
          type: integer
          example: 150
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateLocationRequest:
      type: object
      required: [warehouse_id, name]
      properties:
        warehouse_id:
          type: string
          example: clxwh001
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: Aisle A Row 1
        address:
          type: string
          example: North zone, shelf 1
        capacity_units:
          type: integer
          minimum: 1
          default: 1000

    UpdateLocationRequest:
      type: object
      properties:
        warehouse_id:
          type: string
        name:
          type: string
        address:
          type: string
        capacity_units:
          type: integer
          minimum: 1
        current_volume:
          type: integer
          minimum: 0

    Inventory:
      type: object
      properties:
        id:
          type: string
          example: clxinv001
        product_id:
          type: string
          example: clxprod001
        location_id:
          type: string
          example: clxloc001
        quantity_on_hand:
          type: integer
          example: 150
        quantity_reserved:
          type: integer
          example: 10
        reorder_point:
          type: integer
          example: 50
        max_stock_level:
          type: integer
          example: 500
        last_sold_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InventoryLot:
      type: object
      properties:
        id:
          type: string
          example: clxlot001
        inventory_id:
          type: string
          example: clxinv001
        parent_lot_id:
          type: string
          nullable: true
        lot_code:
          type: string
          example: LOT-2026-04-001
        quantity_received:
          type: integer
          example: 100
        quantity_on_hand:
          type: integer
          example: 70
        quantity_reserved:
          type: integer
          example: 0
        unit_cost:
          type: number
          format: double
          example: 25.00
        received_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        last_decay_applied_at:
          type: string
          format: date-time
          nullable: true

    StockMovement:
      type: object
      properties:
        id:
          type: string
          example: clxmov001
        product_id:
          type: string
          example: clxprod001
        user_id:
          type: string
          example: clxuser001
        from_location_id:
          type: string
          nullable: true
        to_location_id:
          type: string
          nullable: true
        quantity:
          type: integer
          example: 50
        movement_type:
          type: string
          enum: [INCOMING, OUTGOING, TRANSFER, ADJUSTMENT, WRITE_OFF]
        status:
          type: string
          enum: [PENDING, APPROVED, IN_TRANSIT, COMPLETED, REJECTED]
        reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        approved_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    TransferStockRequest:
      type: object
      required: [product_id, from_location_id, to_location_id, quantity]
      properties:
        product_id:
          type: string
          example: clxprod001
        from_location_id:
          type: string
          example: clxloc001
        to_location_id:
          type: string
          example: clxloc002
        quantity:
          type: integer
          minimum: 1
          example: 50
        reason:
          type: string
          example: Rebalancing between warehouses

    TransferStockResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [movement, transferred_quantity]
          properties:
            movement:
              $ref: '#/components/schemas/StockMovement'
            transferred_quantity:
              type: integer
              example: 50

    ReceiveStockRequest:
      type: object
      required: [product_id, location_id, movement_type, quantity, unit_cost]
      properties:
        product_id:
          type: string
          example: clxprod001
        location_id:
          type: string
          example: clxloc001
        movement_type:
          type: string
          enum: [INCOMING]
          example: INCOMING
        quantity:
          type: integer
          minimum: 1
          example: 100
        unit_cost:
          type: number
          minimum: 0
          exclusiveMinimum: true
          example: 25.00
        lot_code:
          type: string
          example: LOT-2026-04-001

    ReceiveStockResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [inventory, lot, movement]
          properties:
            inventory:
              $ref: '#/components/schemas/Inventory'
            lot:
              $ref: '#/components/schemas/InventoryLot'
            movement:
              $ref: '#/components/schemas/StockMovement'

    QuantityRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1
          example: 10

    DecayAudit:
      type: object
      properties:
        id:
          type: string
        inventory_lot_id:
          type: string
        product_id:
          type: string
        location_id:
          type: string
          nullable: true
        old_discount_pct:
          type: integer
        new_discount_pct:
          type: integer
        days_in_inventory:
          type: integer
        automatic_trigger_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

paths:
  /auth/signup:
    post:
      tags: [Auth]
      summary: Sign up and queue verification email
      description: Creates a warehouse operator account that cannot access protected routes until email verification succeeds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Signup accepted and verification email queued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    allOf:
                      - $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/register:
    post:
      tags: [Auth]
      summary: Create a user and assign a role
      description: |
        User self-registration is disabled. Only a SYSTEM_ADMIN can create users
        and assign roles. Login as the seeded admin account first, then authorize
        Swagger with `Bearer <access_token>` before calling this endpoint.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              createOperator:
                summary: Create warehouse operator
                value:
                  email: new.operator@leanstock.com
                  password: SecurePass123
                  first_name: New
                  last_name: Operator
                  role: WAREHOUSE_OPERATOR
              createManager:
                summary: Create manager
                value:
                  email: new.manager@leanstock.com
                  password: SecurePass123
                  first_name: New
                  last_name: Manager
                  role: MANAGER
      responses:
        '201':
          description: User registered successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive JWT tokens
      description: Returns a short-lived access token and a refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/refresh-token:
    post:
      tags: [Auth]
      summary: Exchange refresh token for a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: New access token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke a refresh token
      description: Accepts `refresh_token` in the JSON body or `X-Refresh-Token` header.
      parameters:
        - name: X-Refresh-Token
          in: header
          required: false
          schema:
            type: string
          description: Refresh token to revoke when the body is not used.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Refresh token revoked when provided.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Logged out successfully

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify signup email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Email verified and account activated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Auth]
      summary: Verify signup email from link
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified and account activated.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Generic response returned to avoid account enumeration.
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/request-password-reset:
    post:
      tags: [Auth]
      summary: Queue password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Generic response returned to avoid account enumeration.
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using email token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successfully and refresh tokens revoked.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change current user's password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
