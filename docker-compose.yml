services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leanstock-api
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${ENVIRONMENT:-development}
      APP_PORT: ${BACKEND_PORT:-3000}
      APP_HOST: 0.0.0.0
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://leanstock:leanstock_pass@postgres:5432/leanstock}
      JWT_SECRET: ${JWT_SECRET_KEY:-dev-jwt-secret-min-32-chars-change-in-production-please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET_KEY:-dev-refresh-secret-min-32-chars-change-in-production-please}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGINS:-http://localhost:3001}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      RATE_LIMIT_AUTH_MAX: 100
      RATE_LIMIT_AUTH_WINDOW_MS: 60000
      BCRYPT_ROUNDS: 10
      DEAD_STOCK_THRESHOLD_DAYS: 30
      DEAD_STOCK_DECAY_PERCENT: 10
      DEAD_STOCK_DECAY_MAX_PERCENT: 50
      CRON_ENABLED: true
      DEAD_STOCK_DECAY_SCHEDULE: "0 2 * * *"
      DEFAULT_PAGE_SIZE: 20
      MAX_PAGE_SIZE: 100
      APP_LOG_LEVEL: info
      SYSTEM_USER_ID: system
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_REQUIRED: true
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      EMAIL_FROM: ${EMAIL_FROM_ADDRESS:-no-reply@leanstock.local}
      SENDGRID_API_KEY: ${EMAIL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./logs:/app/logs
    networks:
      - leanstock-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leanstock-worker
    restart: unless-stopped
    command: npm run worker
    environment:
      NODE_ENV: ${ENVIRONMENT:-development}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://leanstock:leanstock_pass@postgres:5432/leanstock}
      JWT_SECRET: ${JWT_SECRET_KEY:-dev-jwt-secret-min-32-chars-change-in-production-please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET_KEY:-dev-refresh-secret-min-32-chars-change-in-production-please}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_REQUIRED: true
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      EMAIL_FROM: ${EMAIL_FROM_ADDRESS:-no-reply@leanstock.local}
      SENDGRID_API_KEY: ${EMAIL_API_KEY:-}
      SYSTEM_USER_ID: system
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const net=require('net');const s=net.createConnection(6379,'redis');s.on('connect',()=>process.exit(0));s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000);",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - leanstock-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api/v1}
    container_name: leanstock-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - api
    networks:
      - leanstock-network

  postgres:
    image: postgres:15-alpine
    container_name: leanstock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leanstock
      POSTGRES_PASSWORD: leanstock_pass
      POSTGRES_DB: leanstock
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/10-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leanstock -d leanstock"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leanstock-network

  redis:
    image: redis:7-alpine
    container_name: leanstock-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - leanstock-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: leanstock-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@leanstock.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - leanstock-network
    profiles:
      - tools

volumes:
  postgres-data:

networks:
  leanstock-network:
    driver: bridge
